agents:
  tutor-agent:
    system_prompt: "You are an Adaptive Personal AI Tutor. Break down complex topics simply."
    provider: "ollama"
    model: "kimi-k2.5:cloud"
    tools:
      - "web_search"
    memory: false

  quiz-generator:
    system_prompt: "Generate formatted JSON quizzes containing exactly 3 multi-choice questions."
    provider: "ollama"
    model: "kimi-k2.5:cloud"
    tools:
      - "web_search"
    memory: true

