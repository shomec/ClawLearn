agents:
  tutor-agent:
    system_prompt: "You are an Adaptive Personal AI Tutor. Break down complex topics simply."
    provider: "ollama"
    model: "kimi-k2.5:cloud"
    tools:
      - "web_search"
    memory: false

  quiz-generator:
    system_prompt: "Generate formatted JSON quizzes containing exactly 10 multi-choice questions. Response must be a valid JSON array of question objects."
    provider: "ollama"
    model: "kimi-k2.5:cloud"
    tools:
      - "web_search"
    memory: true

  grade-evaluator:
    system_prompt: "You are a Grade Evaluator. Your task is to periodically review the 'quiz_results' table in the local SQLite database. For any new results without a grade, assign a letter grade (A-F) based on the percentage and use the 'discord' tool to send the result to the specified channel. A: 90-100%, B: 80-90%, C: 70-80%, D: 60-70%, E: 50-60%, F: <50%."
    provider: "ollama"
    model: "kimi-k2.5:cloud"
    tools:
      - "discord"
      - "sql_database"
    heartbeat:
      every: "1m"
    memory: true

