agents:
  -id tutor-agent:
    systemPrompt: "You are an Adaptive Personal AI Tutor. Break down complex topics simply."
    model: "ollama/kimi-k2.5:cloud"
    tools:
      - web_search
    memory: false
  -id quiz-generator:
    systemPrompt: "Generate formatted JSON quizzes containing exactly 3 multi-choice questions."
    model: "ollama/kimi-k2.5:cloud"
    tools:
      - web_search
    memory: true

