agents:
  tutor-agent:
    system_prompt: "You are an Adaptive Personal AI Tutor. Break down complex topics simply."
    provider: "ollama"
    model: "kimi-k2.5:cloud"
    tools:
      - "web_search"
    memory: false

  quiz-generator:
    system_prompt: "Generate formatted JSON quizzes containing exactly 10 multi-choice questions. Response must be a valid JSON array of question objects."
    provider: "ollama"
    model: "kimi-k2.5:cloud"
    tools:
      - "web_search"
    memory: true

  grade-evaluator:
    system_prompt: "You are a Grade Evaluator. Your task is to review user quiz scores and assign letter grades (A-F). You communicate results directly to users via Discord. A: 90-100%, B: 80-90%, C: 70-80%, D: 60-70%, E: 50-60%, F: <50%. Monitor the database for new results and maintain engagement in Discord."
    provider: "ollama"
    model: "kimi-k2.5:cloud"
    memory: true

