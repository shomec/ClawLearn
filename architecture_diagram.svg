<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles -->
  <style>
    .background { fill: #f8fafc; }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #1e293b; }
    .subtext { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #64748b; }
    
    /* Block Styles */
    .block { stroke-width: 1; rx: 8; }
    .client-block { fill: #eff6ff; stroke: #3b82f6; }
    .backend-block { fill: #f0fdf4; stroke: #22c55e; }
    .agent-block { fill: #fffbeb; stroke: #f59e0b; }
    .external-block { fill: #f8fafc; stroke: #94a3b8; stroke-dasharray: 4; }
    .service-block { fill: #faf5ff; stroke: #a855f7; }
    
    /* Text Styles */
    .block-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
    .service-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #475569; text-anchor: middle; }
    
    /* Connection Styles */
    .flow-line { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }
    .flow-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #334155; font-style: italic; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="800" class="background" />
  
  <text x="50" y="50" class="title">ClawLearn: High-Level System Architecture</text>
  <text x="50" y="75" class="subtext">Multi-Agent AI Tutoring System with Discord Integration</text>

  <!-- USER INTERFACE LAYER -->
  <g transform="translate(50, 120)">
    <rect width="900" height="120" class="external-block" />
    <text x="20" y="25" class="subtext" style="font-weight: bold;">USER ACCESS LAYER</text>
    
    <!-- Student Web -->
    <g transform="translate(150, 40)">
      <rect width="200" height="60" class="client-block block" />
      <text x="100" y="32" class="block-label">Student Browser</text>
      <text x="100" y="50" class="service-label">OpenWebUI Interface</text>
    </g>

    <!-- Student Discord -->
    <g transform="translate(550, 40)">
      <rect width="200" height="60" class="client-block block" style="stroke: #5865f2;" />
      <text x="100" y="32" class="block-label" style="fill: #5865f2;">Discord App</text>
      <text x="100" y="50" class="service-label">Bot Channel Interaction</text>
    </g>
  </g>

  <!-- CORE LOGIC LAYER -->
  <g transform="translate(50, 320)">
    <rect width="900" height="280" class="external-block" />
    <text x="20" y="25" class="subtext" style="font-weight: bold;">BACKEND LOGIC &amp; ORCHESTRATION (OpenClaw)</text>
    
    <!-- Express Server -->
    <g transform="translate(100, 60)">
      <rect width="250" height="180" class="backend-block block" />
      <text x="125" y="35" class="block-label">Node.js Express API</text>
      <text x="125" y="100" class="service-label">REST Endpoint (/v1/chat)</text>
      <text x="125" y="130" class="service-label">Quiz Logic &amp; Grading</text>
      <text x="125" y="160" class="service-label">SQL Client</text>
    </g>

    <!-- OpenClaw Gateway -->
    <g transform="translate(450, 60)">
      <rect width="350" height="180" class="agent-block block" />
      <text x="175" y="35" class="block-label">OpenClaw Agent Gateway</text>
      
      <!-- Agents Area -->
      <g transform="translate(25, 60)">
        <rect width="300" height="100" fill="#fff" stroke="#f59e0b" rx="4" />
        <text x="150" y="-10" class="service-label" style="font-weight: bold;">Workspace Agents (agents.yaml)</text>
        <text x="75" y="30" class="service-label">• Personal Tutor</text>
        <text x="75" y="55" class="service-label">• Quiz Generator</text>
        <text x="75" y="80" class="service-label">• Grade Evaluator</text>
        
        <text x="220" y="30" class="service-label" style="fill: #5865f2; font-weight: bold;">Skill Tools:</text>
        <text x="220" y="55" class="service-label">Web Search</text>
        <text x="220" y="80" class="service-label">Native Discord</text>
      </g>
    </g>
  </g>

  <!-- DATA & INFERENCE LAYER -->
  <g transform="translate(50, 680)">
    <!-- SQLite -->
    <g transform="translate(100, 0)">
      <rect width="250" height="80" class="service-block block" />
      <text x="125" y="35" class="block-label">SQLite Database</text>
      <text x="125" y="60" class="service-label">History / Scores / Results</text>
    </g>

    <!-- Ollama -->
    <g transform="translate(500, 0)">
      <rect width="300" height="80" class="service-block block" style="stroke: #2563eb;" />
      <text x="150" y="35" class="block-label">Ollama Cloud Service</text>
      <text x="150" y="60" class="service-label">LLM Engine (Kimi-k2.5 Cloud)</text>
    </g>
  </g>

  <!-- FLOW LINES -->
  <!-- Browser to Backend -->
  <path d="M 250 240 L 250 380" class="flow-line" />
  <text x="260" y="300" class="flow-label">HTTPS / OpenAI API</text>

  <!-- Backend to OpenClaw -->
  <path d="M 350 460 L 450 460" class="flow-line" />
  <text x="365" y="450" class="flow-label">npx child_process</text>

  <!-- OpenClaw to Ollama -->
  <path d="M 650 500 L 650 680" class="flow-line" />
  <text x="660" y="640" class="flow-label">Inference Stream</text>

  <!-- Discord interactions -->
  <path d="M 650 380 L 650 240" class="flow-line" style="stroke: #5865f2;" />
  <text x="660" y="300" class="flow-label" style="fill: #5865f2;">Grade Notifications &amp; Feedback</text>

  <!-- Database logs -->
  <path d="M 225 500 L 225 680" class="flow-line" />
  <text x="160" y="640" class="flow-label">Persistent Records</text>

</svg>